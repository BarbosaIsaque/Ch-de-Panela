<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Chá de Panelas</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .step { display: none; }
    .step.active { display: block; }
    .code-input {
      width: 100%; text-align: center;
      font-size: 1.7rem; letter-spacing: 0.45em;
      font-weight: 700; font-family: monospace;
      padding: 14px 8px;
    }
    .code-input::placeholder { color: #d8cab5; }
    .code-sent-to { font-weight: 700; color: var(--gold-dark); }
    .form-link-btn {
      background: none; border: none; color: var(--gold-dark);
      cursor: pointer; font-family: inherit; font-size: 0.86rem;
      text-decoration: underline; padding: 4px;
    }
    .dev-code-box {
      background: #fff8e6; border: 1px dashed var(--gold);
      border-radius: 8px; padding: 10px 12px; margin-bottom: 14px;
      font-size: 0.82rem; color: var(--text); text-align: center; line-height: 1.5;
    }
    .dev-code-box strong { font-size: 1.15rem; letter-spacing: 2px; color: var(--gold-dark); }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Chá de <span>Panelas</span></a>
      <ul class="nav-links">
        <li><a href="/lista.html" class="nav-link-text">Lista de Presentes</a></li>
        <li><a href="/carrinho.html" class="nav-cart">🛒 Carrinho <span class="cart-badge"></span></a></li>
      </ul>
      <div id="nav-user-area"></div>
    </div>
  </nav>

  <div class="form-page">
    <div class="container-sm" style="width:100%;">
      <div class="form-card">

        <!-- STEP 1: dados -->
        <div class="step active" id="step-dados">
          <h1>Criar Conta</h1>
          <p class="form-subtitle">Cadastre-se para reservar seus presentes — sem senha!</p>

          <div class="form-error" id="error-dados"></div>

          <form id="dados-form" novalidate>
            <div class="form-group">
              <label for="name">Nome Completo</label>
              <input type="text" id="name" name="name" placeholder="Seu nome completo" autocomplete="name" required />
            </div>
            <div class="form-group">
              <label for="email">E-mail</label>
              <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required />
            </div>
            <div class="form-group">
              <label for="phone">Telefone (com DDD)</label>
              <input type="tel" id="phone" name="phone" placeholder="(11) 99999-9999" autocomplete="tel" required />
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="dados-btn">Continuar</button>
          </form>

          <p class="form-alt">
            Já tem conta? <a id="login-link" href="/login.html">Entrar</a>
          </p>
        </div>

        <!-- STEP 2: código -->
        <div class="step" id="step-codigo">
          <h1>Confirme seu e-mail</h1>
          <p class="form-subtitle">
            Enviamos um código de 6 dígitos para<br>
            <span class="code-sent-to" id="email-display"></span>
          </p>

          <div class="dev-code-box" id="dev-code-box" style="display:none;"></div>
          <div class="form-error" id="error-codigo"></div>

          <form id="codigo-form" novalidate>
            <div class="form-group">
              <label for="code">Código de verificação</label>
              <input type="text" id="code" name="code" class="code-input" placeholder="------"
                     inputmode="numeric" maxlength="6" autocomplete="one-time-code" required />
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="codigo-btn">Entrar</button>
          </form>

          <p class="form-alt" style="line-height:2;">
            Não recebeu? <button type="button" class="form-link-btn" id="resend-btn">Reenviar código</button>
            <br>
            <button type="button" class="form-link-btn" id="back-btn">← Corrigir meus dados</button>
          </p>
        </div>

      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p class="footer-names" data-config="nomes">Ana Clara &amp; Isaque</p>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect') || '/lista.html';

    const loginLink = document.getElementById('login-link');
    if (redirect !== '/lista.html') {
      loginLink.href = `/login.html?redirect=${encodeURIComponent(redirect)}`;
    }

    // dados em memória pro reenvio
    let dados = { name: '', email: '', phone: '' };

    // ── máscara de telefone ──────────────────────────────────
    const phoneInput = document.getElementById('phone');
    phoneInput.addEventListener('input', () => {
      const d = phoneInput.value.replace(/\D/g, '').slice(0, 11);
      let out = d;
      if (d.length > 2) {
        const rest = d.slice(2);
        const split = d.length > 10 ? 5 : 4;
        out = '(' + d.slice(0, 2) + ') ' + (rest.length > split
          ? rest.slice(0, split) + '-' + rest.slice(split)
          : rest);
      }
      phoneInput.value = out;
    });

    function showStep(which) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step-' + which).classList.add('active');
    }
    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
    }
    function clearError(id) {
      document.getElementById(id).classList.remove('visible');
    }

    // ── STEP 1: enviar dados e pedir o código ────────────────
    document.getElementById('dados-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError('error-dados');
      const btn = document.getElementById('dados-btn');

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!name || !email || !phone) {
        return showError('error-dados', 'Preencha nome, e-mail e telefone.');
      }

      btn.disabled = true;
      btn.textContent = 'Enviando código...';

      const res = await App.apiFetch('/api/auth/register-request', {
        method: 'POST',
        body: { name, email, phone },
      });

      btn.disabled = false;
      btn.textContent = 'Continuar';

      if (res.ok) {
        dados = { name, email, phone };
        document.getElementById('email-display').textContent = email;
        handleCodeSent(res.data);
        showStep('codigo');
        document.getElementById('code').focus();
      } else {
        showError('error-dados', res.error || 'Erro ao enviar o código. Tente novamente.');
      }
    });

    // mostra aviso de modo teste, se houver
    function handleCodeSent(data) {
      const box = document.getElementById('dev-code-box');
      if (data && data.devCode) {
        box.innerHTML = `Modo teste (e-mail ainda não configurado).<br>Seu código é: <strong>${data.devCode}</strong>`;
        box.style.display = 'block';
      } else {
        box.style.display = 'none';
      }
    }

    // ── STEP 2: verificar o código ───────────────────────────
    const codeInput = document.getElementById('code');
    codeInput.addEventListener('input', () => {
      codeInput.value = codeInput.value.replace(/\D/g, '').slice(0, 6);
    });

    document.getElementById('codigo-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError('error-codigo');
      const btn = document.getElementById('codigo-btn');
      const code = codeInput.value.trim();

      if (code.length !== 6) {
        return showError('error-codigo', 'Digite os 6 dígitos do código.');
      }

      btn.disabled = true;
      btn.textContent = 'Verificando...';

      const res = await App.apiFetch('/api/auth/verify', {
        method: 'POST',
        body: { email: dados.email, code },
      });

      if (res.ok) {
        App.showToast('Conta criada com sucesso! 🎉', 'success');
        setTimeout(() => { window.location.href = redirect; }, 600);
      } else {
        showError('error-codigo', res.error || 'Código incorreto. Tente novamente.');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });

    // ── reenviar / voltar ────────────────────────────────────
    document.getElementById('resend-btn').addEventListener('click', async () => {
      clearError('error-codigo');
      const res = await App.apiFetch('/api/auth/register-request', {
        method: 'POST',
        body: dados,
      });
      if (res.ok) {
        handleCodeSent(res.data);
        App.showToast('Código reenviado! 📧', 'success');
      } else {
        showError('error-codigo', res.error || 'Não foi possível reenviar agora.');
      }
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      clearError('error-codigo');
      showStep('dados');
    });
  </script>
</body>
</html>
