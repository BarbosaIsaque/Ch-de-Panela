<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presente — Chá de Panelas</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .item-img-wrap {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1 / 1;
      margin: 0 auto 20px;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      border: 1px solid var(--border);
      cursor: zoom-in;
      position: relative;
    }
    .item-img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 10px; }
    .item-img-zoom-hint {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(61,43,31,.72); color: #fff;
      font-size: 0.7rem; padding: 3px 9px; border-radius: 20px;
      pointer-events: none;
    }

    /* ── LIGHTBOX (imagem ampliada) ───────────────────────────── */
    .lightbox-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.88);
      z-index: 300;
      align-items: center; justify-content: center;
      padding: 24px;
      cursor: zoom-out;
    }
    .lightbox-backdrop.open { display: flex; }
    .lightbox-img {
      max-width: 95vw; max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
      background: #fff;
    }
    .lightbox-close {
      position: absolute; top: 18px; right: 22px;
      background: none; border: none; color: #fff;
      font-size: 2rem; cursor: pointer; line-height: 1;
    }

    /* ── PAYMENT MODAL ───────────────────────────────────────── */
    .pay-modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(61,43,31,.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .pay-modal-backdrop.open { display: flex; }

    .pay-modal {
      background: var(--cream);
      border-radius: 16px;
      padding: 28px 24px 24px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 12px 48px rgba(0,0,0,.22);
      position: relative;
      max-height: 92vh;
      overflow-y: auto;
    }
    .pay-modal-close {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; font-size: 1.4rem;
      cursor: pointer; color: var(--text-muted); line-height: 1;
      padding: 4px;
    }
    .pay-modal-item {
      text-align: center;
      margin-bottom: 16px;
    }
    .pay-modal-item-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      margin-bottom: 2px;
    }
    .pay-modal-price {
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--gold-dark);
      font-family: 'Playfair Display', serif;
    }

    /* tabs */
    .pay-tabs {
      display: flex; gap: 6px; margin-bottom: 20px;
    }
    .pay-tab {
      flex: 1; padding: 10px 6px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--card-bg);
      cursor: pointer;
      font-family: inherit; font-size: 0.8rem; font-weight: 700;
      color: var(--text-muted);
      transition: all .2s; text-align: center;
    }
    .pay-tab .tab-icon { font-size: 1.3rem; display: block; margin-bottom: 3px; }
    .pay-tab.active { border-color: var(--gold); color: var(--gold-dark); background: #fffbf4; }
    .pay-panel { display: none; }
    .pay-panel.active { display: block; }

    /* PIX */
    .pix-qr-wrap { text-align: center; margin: 0 0 14px; }
    .pix-qr-wrap img { border-radius: 12px; max-width: 200px; width: 100%; margin: 0 auto; }
    .pix-copy-row {
      display: flex; align-items: center; gap: 8px;
      background: #f5f0e8; border: 1px dashed var(--gold);
      border-radius: 8px; padding: 10px 12px; margin-bottom: 10px;
    }
    .pix-copy-key {
      flex: 1; font-size: 0.72rem; word-break: break-all;
      color: var(--text); font-family: monospace;
    }
    .btn-copy {
      flex-shrink: 0; padding: 6px 12px; font-size: 0.78rem;
      background: var(--gold); color: #fff; border: none;
      border-radius: 6px; cursor: pointer; font-weight: 700;
      font-family: inherit; transition: background .2s; white-space: nowrap;
    }
    .btn-copy:hover { background: var(--gold-dark); }
    .pay-hint {
      font-size: 0.76rem; color: var(--text-muted);
      text-align: center; line-height: 1.5;
    }
    .pay-loading { text-align: center; padding: 32px 0; color: var(--text-muted); font-size: 0.88rem; }

    /* TRANSFERÊNCIA */
    .bank-table { width: 100%; border-collapse: collapse; margin: 0 0 10px; }
    .bank-table td { padding: 9px 6px; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .bank-table td:first-child { color: var(--text-muted); font-weight: 600; width: 42%; }

    /* CARTÃO */
    .card-panel-inner { text-align: center; padding: 8px 0 4px; }
    .card-big-icon { font-size: 2.5rem; margin-bottom: 10px; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Chá de <span>Panelas</span></a>
      <ul class="nav-links">
        <li><a href="/lista.html">Lista de Presentes</a></li>
        <li><a href="/carrinho.html" class="nav-cart">🛒 Carrinho <span class="cart-badge"></span></a></li>
      </ul>
      <div id="nav-user-area"></div>
    </div>
  </nav>

  <div class="item-detail">
    <a href="/lista.html" class="back-link">← Lista de Presentes</a>

    <div class="item-detail-card" id="item-card">
      <div class="skeleton" style="height:160px;width:160px;border-radius:16px;margin:0 auto 20px;"></div>
      <div class="skeleton" style="height:18px;width:55%;margin:0 auto 10px;"></div>
      <div class="skeleton" style="height:30px;width:80%;margin:0 auto 10px;"></div>
      <div class="skeleton" style="height:14px;width:90%;margin:0 auto 18px;"></div>
      <div class="skeleton" style="height:48px;border-radius:8px;margin-bottom:10px;"></div>
    </div>
  </div>

  <!-- PAYMENT MODAL -->
  <div class="pay-modal-backdrop" id="pay-backdrop" onclick="closePayment(event)">
    <div class="pay-modal">
      <button class="pay-modal-close" onclick="closePayment(null, true)">✕</button>
      <div id="pay-modal-inner">
        <div class="pay-loading">Carregando…</div>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX (imagem ampliada) -->
  <div class="lightbox-backdrop" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" aria-label="Fechar">✕</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" />
  </div>

  <!-- FOOTER -->
  <footer>
    <p class="footer-names" data-config="nomes">[Nome da Noiva] &amp; [Nome do Noivo]</p>
    <p data-config="dataEvento">20 de junho de 2026</p>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const itemId = parseInt(params.get('id'), 10);
    let _pixPayload = '';

    async function loadItem() {
      const card = document.getElementById('item-card');
      if (!itemId) { card.innerHTML = `<p style="color:var(--red)">Item não encontrado.</p>`; return; }

      try {
        const [itemRes, meRes] = await Promise.all([
          App.apiFetch(`/api/items/${itemId}`),
          App.apiFetch('/api/auth/me'),
        ]);

        if (!itemRes.ok) { card.innerHTML = `<p style="color:var(--red)">Item não encontrado.</p>`; return; }

        const item = itemRes.data;
        const isLoggedIn = meRes.ok;
        document.title = `${item.name} — Chá de Panelas`;

        let inCart = false;
        if (isLoggedIn) {
          const cartRes = await App.apiFetch('/api/cart');
          if (cartRes.ok) inCart = cartRes.data.some(ci => ci.id === item.id);
        }

        const mediaHtml = item.image
          ? `<div class="item-img-wrap" id="item-img-wrap"><img src="${App.escapeHtml(item.image)}" alt="${App.escapeHtml(item.name)}" class="item-img" /><span class="item-img-zoom-hint">🔍 ampliar</span></div>`
          : `<div class="item-emoji-large">${item.emoji}</div>`;

        let actionHtml = '';
        if (item.reserved) {
          actionHtml = `
            <div class="reserved-msg">
              Este presente já foi reservado 💝<br>
              <small style="opacity:.8;margin-top:4px;display:block">Que tal escolher outro da lista?</small>
            </div>
            <a href="/lista.html" class="btn btn-outline" style="margin-top:16px;">Ver outros presentes</a>
          `;
        } else {
          actionHtml = `
            <button class="btn btn-primary btn-full" id="pay-btn" style="margin-top:20px;">
              💝 Quero presentear
            </button>
          `;
          if (inCart) {
            actionHtml += `<a href="/carrinho.html" class="btn btn-outline btn-full" style="margin-top:10px;">✓ No carrinho — Ver carrinho</a>`;
          } else if (isLoggedIn) {
            actionHtml += `<button class="btn btn-outline btn-full" id="add-cart-btn" style="margin-top:10px;">🛒 Adicionar ao Carrinho</button>`;
          }
        }

        card.innerHTML = `
          ${mediaHtml}
          <p class="item-category">${App.escapeHtml(item.cat)}</p>
          <h1>${App.escapeHtml(item.name)}</h1>
          <p class="item-desc">${App.escapeHtml(item.desc)}</p>
          <div class="item-price-large">${App.formatPrice(item.price)}</div>
          <div><span class="badge ${item.reserved ? 'badge-reserved' : 'badge-available'}">${item.reserved ? 'Reservado' : 'Disponível'}</span></div>
          ${actionHtml}
        `;

        document.getElementById('pay-btn')?.addEventListener('click', () => openPayment(item));

        document.getElementById('item-img-wrap')?.addEventListener('click', () => {
          openLightbox(item.image, item.name);
        });

        const addBtn = document.getElementById('add-cart-btn');
        if (addBtn) {
          addBtn.addEventListener('click', async () => {
            addBtn.disabled = true; addBtn.textContent = 'Adicionando…';
            const res = await App.apiFetch('/api/cart', { method: 'POST', body: { itemId: item.id } });
            if (res.ok) {
              App.showToast('Presente adicionado ao carrinho! 🎁', 'success');
              App.updateCartCount();
              setTimeout(() => loadItem(), 600);
            } else {
              App.showToast(res.error || 'Erro ao adicionar', 'error');
              addBtn.disabled = false; addBtn.textContent = '🛒 Adicionar ao Carrinho';
            }
          });
        }
      } catch {
        card.innerHTML = `<p style="color:var(--red)">Erro ao carregar. Recarregue a página.</p>`;
      }
    }

    async function openPayment(item) {
      document.getElementById('pay-backdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
      document.getElementById('pay-modal-inner').innerHTML = `<div class="pay-loading">Carregando opções de pagamento…</div>`;

      const [pixRes, cfgRes] = await Promise.all([
        App.apiFetch(`/api/pix-quick?itemId=${item.id}`),
        App.apiFetch('/api/config'),
      ]);

      const bank = cfgRes.ok ? (cfgRes.data.bank || {}) : {};
      const cardEnabled = cfgRes.ok ? cfgRes.data.cardEnabled : false;
      const price = App.formatPrice(item.price);

      // PIX panel content
      let pixContent = '';
      if (pixRes.ok) {
        _pixPayload = pixRes.data.payload;
        pixContent = `
          <div class="pix-qr-wrap"><img src="${pixRes.data.qrCode}" alt="QR Code PIX" /></div>
          <div class="pix-copy-row">
            <span class="pix-copy-key">${App.escapeHtml(pixRes.data.payload)}</span>
            <button class="btn-copy" onclick="copyPix()">Copiar</button>
          </div>
          <p class="pay-hint">Abra seu banco → Pix → Pix Copia e Cola<br>O valor já estará preenchido 🧾</p>
        `;
      } else {
        pixContent = `<p class="pay-hint" style="padding:20px 0;">${App.escapeHtml(pixRes.error || 'Erro ao gerar PIX')}</p>`;
      }

      // Transfer panel content
      const transferContent = bank.banco ? `
        <table class="bank-table">
          <tr><td>Banco</td><td><strong>${App.escapeHtml(bank.banco)}</strong></td></tr>
          <tr><td>Agência</td><td>${App.escapeHtml(bank.agencia)}</td></tr>
          <tr><td>Conta</td><td>${App.escapeHtml(bank.conta)}</td></tr>
          <tr><td>Tipo</td><td>${App.escapeHtml(bank.tipo)}</td></tr>
          <tr><td>Titular</td><td>${App.escapeHtml(bank.titular)}</td></tr>
          ${bank.cpf ? `<tr><td>CPF</td><td>${App.escapeHtml(bank.cpf)}</td></tr>` : ''}
          <tr><td>Valor</td><td><strong style="color:var(--gold-dark)">${price}</strong></td></tr>
        </table>
        <p class="pay-hint">Guarde o comprovante de transferência 💕</p>
      ` : `<p class="pay-hint" style="padding:20px 0;">Dados bancários não disponíveis. Entre em contato com os noivos.</p>`;

      // Card panel content
      const cardContent = cardEnabled ? `
        <div class="card-panel-inner">
          <div class="card-big-icon">💳</div>
          <p style="color:var(--text-muted);margin-bottom:16px;font-size:0.88rem;">Você será redirecionada para o ambiente seguro de pagamento.</p>
          <a href="/carrinho.html" class="btn btn-primary" style="width:100%;display:block;">Ir para o carrinho e pagar com cartão</a>
          <p style="font-size:0.72rem;color:var(--text-muted);margin-top:8px;">É necessário criar uma conta para pagar com cartão 🔒</p>
        </div>
      ` : `
        <div class="card-panel-inner">
          <div class="card-big-icon">💳</div>
          <p style="color:var(--text-muted);margin-bottom:12px;font-size:0.88rem;">Estamos configurando o pagamento por cartão. Em breve disponível!</p>
          <p style="font-weight:700;font-size:0.85rem;">Enquanto isso, use PIX ou Transferência — mais rápido e sem taxas 🙏</p>
        </div>
      `;

      document.getElementById('pay-modal-inner').innerHTML = `
        <div class="pay-modal-item">
          <div class="pay-modal-item-name">${item.emoji} ${App.escapeHtml(item.name)}</div>
          <div class="pay-modal-price">${price}</div>
        </div>
        <div class="pay-tabs">
          <button class="pay-tab active" onclick="showTab('pix',this)"><span class="tab-icon">📱</span>PIX</button>
          <button class="pay-tab" onclick="showTab('transfer',this)"><span class="tab-icon">🏦</span>Transferência</button>
          <button class="pay-tab" onclick="showTab('card',this)"><span class="tab-icon">💳</span>Cartão</button>
        </div>
        <div class="pay-panel active" id="modal-panel-pix">${pixContent}</div>
        <div class="pay-panel" id="modal-panel-transfer">${transferContent}</div>
        <div class="pay-panel" id="modal-panel-card">${cardContent}</div>
      `;
    }

    function showTab(tab, btn) {
      document.querySelectorAll('.pay-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.pay-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('modal-panel-' + tab).classList.add('active');
    }

    function closePayment(event, force) {
      if (force || event?.target === document.getElementById('pay-backdrop')) {
        document.getElementById('pay-backdrop').classList.remove('open');
        document.body.style.overflow = '';
      }
    }

    function copyPix() {
      navigator.clipboard.writeText(_pixPayload).then(() => App.showToast('Código PIX copiado!', 'success'));
    }

    function openLightbox(src, alt) {
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      img.src = src; img.alt = alt || '';
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('DOMContentLoaded', loadItem);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closePayment(null, true); closeLightbox(); }
    });
  </script>
</body>
</html>
