<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrinho — Chá de Panelas</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script>(function(){try{var t=localStorage.getItem("theme");if(t!=="dark"&&t!=="light"){t="light";}document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Chá de <span>Panelas</span></a>
      <ul class="nav-links">
        <li><a href="/lista.html" class="nav-link-text">Lista de Presentes</a></li>
        <li><a href="/carrinho.html" class="nav-cart">🛒 Carrinho <span class="cart-badge"></span></a></li>
      </ul>
      <div id="nav-user-area"></div>
    </div>
  </nav>

  <div class="cart-page">
    <div style="margin-bottom:24px;">
      <a href="/lista.html" class="back-link">← Lista de Presentes</a>
      <h1 style="font-size:2rem;">Meu Carrinho</h1>
    </div>

    <div id="cart-content">
      <!-- Loaded by JS -->
      <div class="skeleton" style="height:80px;border-radius:10px;margin-bottom:12px;"></div>
      <div class="skeleton" style="height:80px;border-radius:10px;margin-bottom:12px;"></div>
      <div class="skeleton" style="height:80px;border-radius:10px;margin-bottom:24px;"></div>
      <div class="skeleton" style="height:120px;border-radius:10px;"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p class="footer-names" data-config="nomes">Ana Clara &amp; Isaque</p>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    async function checkAuth() {
      const res = await App.apiFetch('/api/auth/me');
      if (!res.ok) {
        window.location.href = '/login.html?redirect=/carrinho.html';
        return false;
      }
      return true;
    }

    async function loadCart() {
      const content = document.getElementById('cart-content');
      const res = await App.apiFetch('/api/cart');
      if (!res.ok) {
        content.innerHTML = `<p style="color:var(--red)">Erro ao carregar carrinho.</p>`;
        return;
      }

      const items = res.data;

      if (items.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🛒</div>
            <h2>Seu carrinho está vazio</h2>
            <p>Escolha presentes da nossa lista para adicionar ao carrinho.</p>
            <a href="/lista.html" class="btn btn-primary">Ver Lista de Presentes</a>
          </div>
        `;
        return;
      }

      const total = items.reduce((s, i) => s + i.price, 0);

      content.innerHTML = `
        <div class="cart-list" id="cart-list">
          ${items.map(item => `
            <div class="cart-item" id="cart-item-${item.id}">
              <div class="cart-item-emoji">${item.emoji}</div>
              <div class="cart-item-info">
                <div class="cart-item-name">${App.escapeHtml(item.name)}</div>
                <div class="cart-item-price">${App.formatPrice(item.price)}</div>
              </div>
              <div class="cart-item-remove">
                <button class="btn btn-danger" onclick="removeItem(${item.id})">Remover</button>
              </div>
            </div>
          `).join('')}
        </div>

        <div class="cart-summary">
          <div class="cart-total">
            <span>Total</span>
            <span class="cart-total-value" id="cart-total">${App.formatPrice(total)}</span>
          </div>
          <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px;">
            ${items.length} ${items.length === 1 ? 'presente' : 'presentes'} selecionado${items.length === 1 ? '' : 's'}
          </p>

          <button class="btn btn-primary btn-full" id="pix-btn" onclick="payPix()">
            📱 Pagar com PIX
          </button>
          <button class="btn btn-outline btn-full" id="cash-btn" onclick="checkoutCash()" style="margin-top:10px;">
            💵 Vou pagar em dinheiro no dia
          </button>
          <p style="text-align:center;margin-top:14px;">
            <a href="#" id="card-link" onclick="checkout(event)" style="font-size:0.8rem;color:var(--text-muted);text-decoration:underline;">
              Prefere cartão de crédito/parcelado? Pague com cartão
            </a>
          </p>
        </div>

        <p style="text-align:center;font-size:0.75rem;color:var(--text-muted);margin-top:12px;">
          PIX instantâneo via AbacatePay 🔒
        </p>
      `;
    }

    // ── PIX dinâmico (AbacatePay) — QR na própria página ──────────
    let pixPollTimer = null;

    async function payPix() {
      const btn = document.getElementById('pix-btn');
      if (!btn) return;
      btn.disabled = true;
      btn.textContent = 'Gerando QR Code...';

      const res = await App.apiFetch('/api/pix-charge', { method: 'POST' });

      if (!res.ok || !res.data.brCode) {
        App.showToast(res.error || 'Não foi possível gerar o PIX. Tente novamente.', 'error');
        btn.disabled = false;
        btn.textContent = '📱 Pagar com PIX';
        return;
      }

      showPixView(res.data);
      startPixPolling(res.data.sessionId);
    }

    function showPixView({ brCode, brCodeBase64, total }) {
      const content = document.getElementById('cart-content');
      const qrSrc = (brCodeBase64 || '').startsWith('data:')
        ? brCodeBase64
        : `data:image/png;base64,${brCodeBase64}`;

      content.innerHTML = `
        <div class="cart-summary" style="text-align:center;max-width:420px;margin:0 auto;">
          <h2 style="font-size:1.4rem;margin-bottom:4px;">Pague com PIX</h2>
          <p style="color:var(--text-muted);margin-bottom:16px;">
            Escaneie o QR Code ou copie o código. Total <strong>${App.formatPrice(total)}</strong>.
          </p>

          ${brCodeBase64 ? `<img src="${qrSrc}" alt="QR Code PIX" style="width:240px;height:240px;border-radius:12px;background:#fff;padding:8px;display:block;margin:0 auto;" />` : ''}

          <div style="margin:18px 0;">
            <textarea id="pix-code" readonly rows="3"
              style="width:100%;font-size:0.8rem;padding:10px;border:1px solid var(--border,#e0d8cc);border-radius:8px;resize:none;background:#faf7f2;">${App.escapeHtml(brCode)}</textarea>
            <button class="btn btn-primary btn-full" style="margin-top:8px;" onclick="copyPix()">📋 Copiar código PIX</button>
          </div>

          <p id="pix-status" style="font-size:0.9rem;color:var(--text-muted);">
            ⏳ Aguardando o pagamento... a página confirma sozinha.
          </p>

          <button class="btn btn-outline btn-full" style="margin-top:10px;" onclick="cancelPix()">← Voltar ao carrinho</button>
        </div>
      `;
    }

    function copyPix() {
      const ta = document.getElementById('pix-code');
      if (!ta) return;
      navigator.clipboard.writeText(ta.value)
        .then(() => App.showToast('Código PIX copiado!', 'success'))
        .catch(() => { ta.select(); document.execCommand('copy'); App.showToast('Código PIX copiado!', 'success'); });
    }

    function startPixPolling(sessionId) {
      clearInterval(pixPollTimer);
      pixPollTimer = setInterval(async () => {
        const res = await App.apiFetch(`/api/pix-status?sessionId=${encodeURIComponent(sessionId)}`);
        if (res.ok && res.data.paid) {
          clearInterval(pixPollTimer);
          App.updateCartCount();
          content.innerHTML = `
            <div class="cart-summary" style="text-align:center;max-width:440px;margin:0 auto;">
              <div style="font-size:3rem;line-height:1;margin-bottom:10px;">💝</div>
              <h2 style="font-size:1.5rem;margin-bottom:10px;">Pagamento confirmado!</h2>
              <p style="color:var(--text-muted);margin-bottom:6px;font-size:1.02rem;">
                Muito obrigada pelo seu presente! 🥰
              </p>
              <p style="color:var(--text-muted);margin-bottom:22px;font-size:0.95rem;">
                Cada contribuição vira um pedacinho do nosso novo lar — e a gente fica muito feliz em ter você com a gente nessa. Com carinho, <strong data-config="nomes">Ana Clara &amp; Isaque</strong>.
              </p>
              <a href="/meus-pedidos.html" class="btn btn-primary btn-full">Ver meus pedidos</a>
              <a href="/lista.html" class="btn btn-outline btn-full" style="margin-top:10px;">Voltar à lista de presentes</a>
            </div>
          `;
          App.loadConfig().then(cfg => {
            if (cfg && cfg.nomes) {
              content.querySelectorAll('[data-config="nomes"]').forEach(el => { el.textContent = cfg.nomes; });
            }
          });
        }
      }, 4000);
    }

    function cancelPix() {
      clearInterval(pixPollTimer);
      loadCart();
    }

    async function removeItem(itemId) {
      const el = document.getElementById(`cart-item-${itemId}`);
      if (el) { el.style.opacity = '0.4'; el.style.pointerEvents = 'none'; }

      const res = await App.apiFetch(`/api/cart/${itemId}`, { method: 'DELETE' });
      if (res.ok) {
        App.showToast('Item removido do carrinho', 'info');
        App.updateCartCount();
        await loadCart();
      } else {
        if (el) { el.style.opacity = ''; el.style.pointerEvents = ''; }
        App.showToast('Erro ao remover item', 'error');
      }
    }

    // Pagamento via InfinitePay (Cartão / Débito / PIX)
    // O carrinho NÃO é limpo aqui — só quando o webhook confirmar o pagamento
    async function checkout(ev) {
      if (ev) ev.preventDefault();
      clearInterval(pixPollTimer);
      const link = document.getElementById('card-link');
      if (link) link.textContent = 'Gerando link do cartão...';

      const res = await App.apiFetch('/api/card-link', { method: 'POST' });

      if (res.ok && res.data.url) {
        window.location.href = res.data.url;
      } else {
        App.showToast(res.error || 'Erro ao gerar link de pagamento', 'error');
        if (link) link.textContent = 'Prefere cartão de crédito/parcelado? Pague com cartão';
      }
    }

    // Pagamento em dinheiro — cria pedido diretamente e redireciona
    async function checkoutCash() {
      const btn = document.getElementById('cash-btn');
      if (!btn) return;
      btn.disabled = true;
      btn.textContent = 'Processando...';

      const res = await App.apiFetch('/api/orders', { method: 'POST' });

      if (res.ok) {
        // Registrar como dinheiro
        await App.apiFetch(`/api/orders/${res.data.orderId}/cash`, { method: 'POST' });
        App.updateCartCount();
        window.location.href = `/confirmacao.html?orderId=${res.data.orderId}`;
      } else {
        App.showToast(res.error || 'Erro ao finalizar pedido', 'error');
        btn.disabled = false;
        btn.textContent = '💵 Vou pagar em dinheiro no dia';
        await loadCart();
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const authed = await checkAuth();
      if (authed) await loadCart();
    });
  </script>
</body>
</html>
