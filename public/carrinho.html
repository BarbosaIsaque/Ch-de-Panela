<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrinho — Chá de Panelas</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Chá de <span>Panelas</span></a>
      <ul class="nav-links">
        <li><a href="/lista.html">Lista de Presentes</a></li>
        <li><a href="/carrinho.html" class="nav-cart">🛒 Carrinho <span class="cart-badge"></span></a></li>
      </ul>
      <div id="nav-user-area"></div>
    </div>
  </nav>

  <div class="cart-page">
    <div style="margin-bottom:24px;">
      <a href="/lista.html" class="back-link">← Lista de Presentes</a>
      <h1 style="font-size:2rem;">Meu Carrinho</h1>
    </div>

    <div id="cart-content">
      <!-- Loaded by JS -->
      <div class="skeleton" style="height:80px;border-radius:10px;margin-bottom:12px;"></div>
      <div class="skeleton" style="height:80px;border-radius:10px;margin-bottom:12px;"></div>
      <div class="skeleton" style="height:80px;border-radius:10px;margin-bottom:24px;"></div>
      <div class="skeleton" style="height:120px;border-radius:10px;"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p class="footer-names" data-config="nomes">Ana Clara &amp; Isaque</p>
    <p data-config="dataEvento">20 de junho de 2026</p>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    async function checkAuth() {
      const res = await App.apiFetch('/api/auth/me');
      if (!res.ok) {
        window.location.href = '/login.html?redirect=/carrinho.html';
        return false;
      }
      return true;
    }

    async function loadCart() {
      const content = document.getElementById('cart-content');
      const res = await App.apiFetch('/api/cart');
      if (!res.ok) {
        content.innerHTML = `<p style="color:var(--red)">Erro ao carregar carrinho.</p>`;
        return;
      }

      const items = res.data;

      if (items.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🛒</div>
            <h2>Seu carrinho está vazio</h2>
            <p>Escolha presentes da nossa lista para adicionar ao carrinho.</p>
            <a href="/lista.html" class="btn btn-primary">Ver Lista de Presentes</a>
          </div>
        `;
        return;
      }

      const total = items.reduce((s, i) => s + i.price, 0);

      content.innerHTML = `
        <div class="cart-list" id="cart-list">
          ${items.map(item => `
            <div class="cart-item" id="cart-item-${item.id}">
              <div class="cart-item-emoji">${item.emoji}</div>
              <div class="cart-item-info">
                <div class="cart-item-name">${App.escapeHtml(item.name)}</div>
                <div class="cart-item-price">${App.formatPrice(item.price)}</div>
              </div>
              <div class="cart-item-remove">
                <button class="btn btn-danger" onclick="removeItem(${item.id})">Remover</button>
              </div>
            </div>
          `).join('')}
        </div>

        <div class="cart-summary">
          <div class="cart-total">
            <span>Total</span>
            <span class="cart-total-value" id="cart-total">${App.formatPrice(total)}</span>
          </div>
          <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px;">
            ${items.length} ${items.length === 1 ? 'presente' : 'presentes'} selecionado${items.length === 1 ? '' : 's'}
          </p>

          <!-- QR code PIX inline (AbacatePay) — aparece ao clicar -->
          <div id="pix-panel" style="display:none;margin-bottom:16px;">
            <div style="text-align:center;padding:20px;background:#fffbf4;border-radius:12px;border:1px dashed var(--gold);">
              <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;">Pix — Escaneie ou copie</p>
              <div id="pix-qr-img" style="margin-bottom:12px;"></div>
              <div style="display:flex;align-items:center;gap:8px;background:#f5f0e8;border-radius:8px;padding:10px 12px;margin-bottom:10px;">
                <span id="pix-brcode" style="flex:1;font-size:0.72rem;word-break:break-all;color:var(--text);text-align:left;"></span>
                <button onclick="copyBrCode()" style="flex-shrink:0;padding:6px 12px;font-size:0.8rem;background:var(--gold);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-family:inherit;">Copiar</button>
              </div>
              <p id="pix-expires" style="font-size:0.75rem;color:var(--text-muted);">Válido por 30 minutos · Aguardando pagamento…</p>
            </div>
          </div>

          <button class="btn btn-primary btn-full" id="pix-btn" onclick="checkoutPix()">
            📱 Pagar com PIX
          </button>
          <button class="btn btn-outline btn-full" id="checkout-btn" onclick="checkout()" style="margin-top:10px;">
            💳 Cartão / Débito — via InfinitePay
          </button>
          <button class="btn btn-outline btn-full" id="cash-btn" onclick="checkoutCash()" style="margin-top:10px;">
            💵 Vou pagar em dinheiro no dia
          </button>
        </div>

        <p style="text-align:center;font-size:0.75rem;color:var(--text-muted);margin-top:12px;">
          PIX via AbacatePay · Cartão via InfinitePay 🔒
        </p>
      `;
    }

    async function removeItem(itemId) {
      const el = document.getElementById(`cart-item-${itemId}`);
      if (el) { el.style.opacity = '0.4'; el.style.pointerEvents = 'none'; }

      const res = await App.apiFetch(`/api/cart/${itemId}`, { method: 'DELETE' });
      if (res.ok) {
        App.showToast('Item removido do carrinho', 'info');
        App.updateCartCount();
        await loadCart();
      } else {
        if (el) { el.style.opacity = ''; el.style.pointerEvents = ''; }
        App.showToast('Erro ao remover item', 'error');
      }
    }

    // PIX dinâmico via AbacatePay — QR code inline, sem sair do site
    async function checkoutPix() {
      const btn = document.getElementById('pix-btn');
      const panel = document.getElementById('pix-panel');
      if (!btn) return;

      // Se já está aberto, fechar
      if (panel && panel.style.display !== 'none') {
        panel.style.display = 'none';
        btn.textContent = '📱 Pagar com PIX';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Gerando QR Code…';

      const res = await App.apiFetch('/api/pix-charge', { method: 'POST' });

      if (res.ok) {
        const { brCode, brCodeBase64, expiresAt } = res.data;
        document.getElementById('pix-qr-img').innerHTML =
          `<img src="${brCodeBase64}" style="width:200px;height:200px;border-radius:10px;" alt="QR Code PIX">`;
        document.getElementById('pix-brcode').textContent = brCode;
        window._pixBrCode = brCode;
        if (expiresAt) {
          const exp = new Date(expiresAt).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
          document.getElementById('pix-expires').textContent = `Válido até ${exp} · Aguardando pagamento…`;
        }
        if (panel) panel.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '✕ Fechar PIX';

        // Polling: verificar a cada 5s se o pagamento foi confirmado
        pollPixPayment(res.data.sessionId);
      } else {
        App.showToast(res.error || 'Erro ao gerar QR Code PIX', 'error');
        btn.disabled = false;
        btn.textContent = '📱 Pagar com PIX';
      }
    }

    function copyBrCode() {
      navigator.clipboard.writeText(window._pixBrCode || '')
        .then(() => App.showToast('Código PIX copiado!', 'success'));
    }

    // Verifica a cada 5s se o pagamento foi confirmado (webhook recebido)
    async function pollPixPayment(sessionId) {
      if (!sessionId) return;
      const interval = setInterval(async () => {
        const res = await App.apiFetch(`/api/pix-status?sessionId=${sessionId}`);
        if (res.ok && res.data.paid) {
          clearInterval(interval);
          App.showToast('🎉 Pagamento PIX confirmado! Obrigado!', 'success');
          App.updateCartCount();
          setTimeout(() => { window.location.href = '/lista.html'; }, 2000);
        }
      }, 5000);
      // Parar após 30 min
      setTimeout(() => clearInterval(interval), 30 * 60 * 1000);
    }

    // Pagamento via InfinitePay (Cartão / Débito)
    // O carrinho NÃO é limpo aqui — só quando o webhook confirmar o pagamento
    async function checkout() {
      const btn = document.getElementById('checkout-btn');
      if (!btn) return;
      btn.disabled = true;
      btn.textContent = 'Gerando link...';

      const res = await App.apiFetch('/api/card-link', { method: 'POST' });

      if (res.ok && res.data.url) {
        window.location.href = res.data.url;
      } else {
        App.showToast(res.error || 'Erro ao gerar link de pagamento', 'error');
        btn.disabled = false;
        btn.textContent = '💳 Pagar — PIX / Débito / Crédito';
      }
    }

    // Pagamento em dinheiro — cria pedido diretamente e redireciona
    async function checkoutCash() {
      const btn = document.getElementById('cash-btn');
      if (!btn) return;
      btn.disabled = true;
      btn.textContent = 'Processando...';

      const res = await App.apiFetch('/api/orders', { method: 'POST' });

      if (res.ok) {
        // Registrar como dinheiro
        await App.apiFetch(`/api/orders/${res.data.orderId}/cash`, { method: 'POST' });
        App.updateCartCount();
        window.location.href = `/confirmacao.html?orderId=${res.data.orderId}`;
      } else {
        App.showToast(res.error || 'Erro ao finalizar pedido', 'error');
        btn.disabled = false;
        btn.textContent = '💵 Vou pagar em dinheiro no dia';
        await loadCart();
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const authed = await checkAuth();
      if (authed) await loadCart();
    });
  </script>
</body>
</html>
